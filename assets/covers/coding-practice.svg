<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1536" width="1024" height="1536">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f2027"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="1024" height="1536" fill="url(#bg)"/>
  <circle cx="512" cy="300" r="380" fill="#60a5fa" opacity="0.08"/>
  <g opacity="0.06" font-family="Courier New,monospace" fill="#3b82f6">
    <rect x="100" y="180" width="240" height="160" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="116" cy="198" r="5" fill="#ef4444"/>
    <circle cx="134" cy="198" r="5" fill="#f59e0b"/>
    <circle cx="152" cy="198" r="5" fill="#22c55e"/>
    <text x="110" y="230" font-size="11" fill="#64748b">$ docker run -it app</text>
    <text x="110" y="250" font-size="11" fill="#22c55e">Building container...</text>
    <text x="110" y="270" font-size="11" fill="#94a3b8">&gt;&gt;&gt; python main.py</text>
    <text x="110" y="290" font-size="11" fill="#22c55e">Server started</text>
    <rect x="700" y="1100" width="220" height="140" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="716" cy="1118" r="5" fill="#ef4444"/>
    <circle cx="734" cy="1118" r="5" fill="#f59e0b"/>
    <circle cx="752" cy="1118" r="5" fill="#22c55e"/>
    <text x="710" y="1150" font-size="11" fill="#22c55e">$ pip install</text>
    <text x="710" y="1170" font-size="11" fill="#94a3b8">async app</text>
    <text x="710" y="1190" font-size="11" fill="#64748b">Done</text>
  </g>
  <g transform="translate(512, 580)">
    <rect x="-90" y="-112" width="180" height="56" rx="28" fill="#3b82f6" opacity="0.15"/>
    <text x="0" y="-78" text-anchor="middle" fill="#3b82f6" font-family="Courier New,monospace" font-size="22" font-weight="bold">/ Build</text>
    <text x="0" y="10" text-anchor="middle" fill="#ffffff" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="66" font-weight="900" filter="url(#shadow)">编程实战项目合集</text>
    <text x="0" y="80" text-anchor="middle" fill="#94a3b8" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="28">Docker Python CLI 工具实战</text>
  </g>
  <line x1="312" y1="700" x2="712" y2="700" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <g transform="translate(512, 800)" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="22" fill="#cbd5e1" text-anchor="middle">
    <text x="0" y="0">- Docker 入门 容器化你的第一个应用</text>
    <text x="0" y="50">- Python 异步编程 asyncio 实战</text>
    <text x="0" y="100">- 生成器与迭代器 高效处理大数据</text>
    <text x="0" y="150">- 装饰器从入门到进阶</text>
    <text x="0" y="200">- 用 Python 写 CLI 命令行工具</text>
  </g>
  <g transform="translate(512, 1380)" font-family="PingFang SC,Microsoft YaHei,sans-serif" text-anchor="middle">
    <rect x="-100" y="-18" width="200" height="36" rx="18" fill="url(#accent)" opacity="0.9"/>
    <text x="0" y="6" fill="#ffffff" font-size="20" font-weight="bold">5 个实战项目</text>
  </g>
  <rect x="40" y="40" width="80" height="3" rx="1.5" fill="#3b82f6" opacity="0.5"/>
  <rect x="40" y="40" width="3" height="80" rx="1.5" fill="#3b82f6" opacity="0.5"/>
  <rect x="904" y="40" width="80" height="3" rx="1.5" fill="#3b82f6" opacity="0.5"/>
  <rect x="981" y="40" width="3" height="80" rx="1.5" fill="#3b82f6" opacity="0.5"/>
  <rect x="40" y="1456" width="80" height="3" rx="1.5" fill="#3b82f6" opacity="0.5"/>
  <rect x="40" y="1413" width="3" height="80" rx="1.5" fill="#3b82f6" opacity="0.5"/>
</svg>