    <text x="0" y="10" text-anchor="middle" fill="#ffffff" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="60" font-weight="900" filter="url(#shadow)">AI 工具评测大全</text>
    <text x="0" y="80" text-anchor="middle" fill="#94a3b8" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="28">2025 帮你选出最适合的工具</text>
  </g>
  <line x1="312" y1="700" x2="712" y2="700" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <g transform="translate(512, 790)" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="22" fill="#cbd5e1" text-anchor="middle">
