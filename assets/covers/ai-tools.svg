    <text x="0" y="6" fill="#ffffff" font-size="20" font-weight="bold">2 篇深度评测</text>
  </g>
  <rect x="40" y="40" width="80" height="3" rx="1.5" fill="#8b5cf6" opacity="0.5"/>
  <rect x="40" y="40" width="3" height="80" rx="1.5" fill="#8b5cf6" opacity="0.5"/>
  <rect x="904" y="40" width="80" height="3" rx="1.5" fill="#8b5cf6" opacity="0.5"/>
  <rect x="981" y="40" width="3" height="80" rx="1.5" fill="#8b5cf6" opacity="0.5"/>
  <rect x="40" y="1456" width="80" height="3" rx="1.5" fill="#8b5cf6" opacity="0.5"/>
  <rect x="40" y="1413" width="3" height="80" rx="1.5" fill="#8b5cf6" opacity="0.5"/>
