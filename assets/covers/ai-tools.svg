<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1536" width="1024" height="1536">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#162240"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="1024" height="1536" fill="url(#bg)"/>
  <circle cx="512" cy="300" r="380" fill="#a78bfa" opacity="0.08"/>
  <g opacity="0.1" fill="none" stroke="url(#accent)" stroke-width="1.5">
    <rect x="120" y="200" width="160" height="90" rx="12"/>
    <text x="200" y="252" text-anchor="middle" fill="#8b5cf6" font-family="Arial,sans-serif" font-size="14" font-weight="bold" stroke="none">Claude</text>
    <rect x="744" y="200" width="160" height="90" rx="12"/>
    <text x="824" y="252" text-anchor="middle" fill="#06b6d4" font-family="Arial,sans-serif" font-size="14" font-weight="bold" stroke="none">GPT-4</text>
    <text x="512" y="255" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="28" font-weight="bold" stroke="none">VS</text>
  </g>
  <g transform="translate(512, 580)">
    <rect x="-80" y="-112" width="160" height="56" rx="28" fill="#8b5cf6" opacity="0.15"/>
