<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1536" width="1024" height="1536">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1926"/>
      <stop offset="50%" stop-color="#0d2818"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="1024" height="1536" fill="url(#bg)"/>
  <circle cx="512" cy="300" r="380" fill="#4ade80" opacity="0.08"/>
  <g opacity="0.08" font-family="Courier New,monospace" font-size="12" fill="#22c55e">
    <text x="80" y="200">function</text>
    <text x="80" y="230">  def hello():</text>
    <text x="80" y="260">    print(Python)</text>
    <text x="80" y="290">/function</text>
  </g>
  <g opacity="0.12" stroke="#22c55e" stroke-width="1" fill="none">
    <rect x="800" y="180" width="100" height="120" rx="4"/>
    <rect x="130" y="1100" width="120" height="150" rx="4"/>
  </g>
  <g transform="translate(512, 580)">
    <rect x="-68" y="-112" width="136" height="56" rx="28" fill="#22c55e" opacity="0.15"/>
    <text x="0" y="-78" text-anchor="middle" fill="#22c55e" font-family="Courier New,monospace" font-size="24" font-weight="bold">PY</text>
    <text x="0" y="10" text-anchor="middle" fill="#ffffff" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="66" font-weight="900" filter="url(#shadow)">Python 编程入门到精通</text>
    <text x="0" y="80" text-anchor="middle" fill="#94a3b8" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="28">异步编程 生成器 装饰器实战</text>
  </g>
  <line x1="312" y1="700" x2="712" y2="700" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <g transform="translate(512, 780)" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="22" fill="#cbd5e1" text-anchor="middle">
    <text x="0" y="0">- asyncio 异步编程实战</text>
    <text x="0" y="45">- 生成器与迭代器 高效处理大数据</text>
    <text x="0" y="90">- 装饰器从入门到进阶</text>
  </g>
  <g transform="translate(512, 1380)" font-family="PingFang SC,Microsoft YaHei,sans-serif" text-anchor="middle">
    <rect x="-100" y="-18" width="200" height="36" rx="18" fill="url(#accent)" opacity="0.9"/>
    <text x="0" y="6" fill="#ffffff" font-size="20" font-weight="bold">3 篇深入文章</text>
  </g>
  <rect x="40" y="40" width="80" height="3" rx="1.5" fill="#22c55e" opacity="0.5"/>
  <rect x="40" y="40" width="3" height="80" rx="1.5" fill="#22c55e" opacity="0.5"/>
  <rect x="904" y="40" width="80" height="3" rx="1.5" fill="#22c55e" opacity="0.5"/>
