    async function startOrder(productId) {
      document.getElementById('payStepQR').style.display = 'block';
      document.getElementById('payStepDone').classList.remove('active');
      document.getElementById('payStepError').classList.remove('active');
      document.getElementById('payModal').classList.add('active');

      document.getElementById('payStatus').className = 'pay-status waiting';
      document.getElementById('payStatus').textContent = '鈴?姝ｅ湪鍒涘缓璁㈠崟...';

      try {
        const res = await fetch(API_BASE + '/api/create-order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ productId })
        });
        const data = await res.json();

        if (data.qrcode) {
          currentOrderId = data.orderId;
          document.getElementById('payQRCode').innerHTML = '<img src="' + data.qrcode + '" alt="鏀舵鐮?>';
          document.getElementById('payStatus').textContent = '鈴?绛夊緟鎵爜鏀粯...';
          startPolling(data.orderId);
        } else {
          throw new Error(data.error || '鍒涘缓璁㈠崟澶辫触');
        }
      } catch (err) {
        document.getElementById('payStepQR').style.display = 'none';
        document.getElementById('payStepError').classList.add('active');
      }
    }

    // === 杞鏀粯鐘舵€?===
    function startPolling(orderId) {
      if (pollTimer) clearInterval(pollTimer);

      pollTimer = setInterval(async () => {
        try {
          const res = await fetch(API_BASE + '/api/check-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ orderId })
          });
          const data = await res.json();

          if (data.paid) {
            clearInterval(pollTimer);
            pollTimer = null;
            
            document.getElementById('payStepQR').style.display = 'none';
            document.getElementById('payStepDone').classList.add('active');
            document.getElementById('downloadLink').href = data.downloadUrl;
            
            // 鑷姩寮€濮嬩笅杞?            setTimeout(() => {
              window.open(data.downloadUrl, '_blank');
            }, 500);
          }
        } catch (e) {
          // 杞澶辫触锛岀户缁皾璇?        }
      }, 2000); // 姣?2 绉掓煡涓€娆?
      // 5 鍒嗛挓鍚庤秴鏃?      setTimeout(() => {
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
          document.getElementById('payStatus').textContent = '鈴?浜岀淮鐮佸凡杩囨湡锛岃閲嶆柊涓嬪崟';
        }
      }, 300000);
    }

    function closeModal() {

        clearInterval(pollTimer);
        pollTimer = null;

    }

    document.getElementById('payModal').addEventListener('click', function(e) {

    });
