 1. 从“语言模型”到“大语言模型”

传统语言模型的任务是预测下一个词。比如输入“今天天气真”，模型会预测“好”、“不错”等词。大语言模型在此基础上做了两件事：规模扩大（百亿级参数）和能力涌现（推理、翻译、编程等）。
