        <p><h1>鐢≒ython鍐欎竴涓懡浠よ宸ュ叿锛歛rgparse瀹炴垬</h1></p><p>浣犳槸鍚﹀啓杩囪繖鏍风殑鑴氭湰锛氭瘡娆¤繍琛岄兘瑕佹墜鍔ㄤ慨鏀逛唬鐮侀噷鐨勬枃浠惰矾寰勩€佸弬鏁版暟鍊硷紵鎴栬€呮兂缁欏悓浜嬫彁渚涗竴涓槗鐢ㄧ殑宸ュ叿锛屽嵈涓嶇煡閬撴€庝箞澶勭悊鍛戒护琛屽弬鏁帮紵Python鏍囧噯搴撲腑鐨?code>argparse</code>妯″潡姝ｆ槸瑙ｅ喅杩欎簺闂鐨勫埄鍣ㄣ€傛湰鏂囧皢閫氳繃涓変釜瀹炴垬鍦烘櫙锛屽甫浣犳帉鎻rgparse鐨勬牳蹇冪敤娉曘€?/p><p><h2>鍩虹鍏ラ棬锛氫粠闆舵惌寤哄弬鏁拌В鏋愭鏋?/h2></p><p>棣栧厛锛屾垜浠敤鏈€绠€鍗曠殑渚嬪瓙璁よ瘑argparse鐨勫伐浣滄祦绋嬨€傚亣璁炬垜浠鍐欎竴涓枃浠跺鐞嗗伐鍏凤紝闇€瑕佹帴鏀舵枃浠跺悕鍜屾搷浣滄ā寮忋€?/p><p><pre><code class="language-python">import argparse</p><p>def main():
    parser = argparse.ArgumentParser(description='鏂囦欢澶勭悊宸ュ叿')
    parser.add_argument('filename', help='瑕佸鐞嗙殑鏂囦欢鍚?)

    print(f'澶勭悊鏂囦欢锛歿args.filename}')
    print(f'鎿嶄綔妯″紡锛歿args.mode}')</p><p>if __name__ == '__main__':

鎿嶄綔妯″紡锛歸rite</code></pre></p><p>鍏抽敭鐐硅В鏋愶細
<ul><li><code>add_argument()</code>鐨勭涓€涓弬鏁版槸鍙傛暟鍚嶏紝涓嶅甫<code>--</code>鐨勬槸浣嶇疆鍙傛暟锛堝繀椤绘彁渚涳級锛屽甫<code>--</code>鐨勬槸鍙€夊弬鏁?/li>

<li><code>help</code>涓烘瘡涓弬鏁版坊鍔犺鏄庯紝杩愯<code>python file_tool.py -h</code>鏃朵細鑷姩鐢熸垚甯姪淇℃伅</li>

<h2>杩涢樁瀹炴垬锛氭瀯寤哄鍔熻兘璁＄畻鍣?/h2></p><p>鐜板湪鎴戜滑鏉ュ仛涓€涓洿瀹炵敤鐨勪緥瀛愶細涓€涓敮鎸佸姞銆佸噺銆佷箻銆侀櫎鐨勮绠楀櫒锛屽彲浠ュ鐞嗕换鎰忔暟閲忕殑鏁板瓧锛岃繕鑳介€夋嫨杈撳嚭鏍煎紡銆?/p><p><pre><code class="language-python">import argparse</p><p>def calculate(numbers, operation):
    if operation == 'add':
        return sum(numbers)
    elif operation == 'sub':
        result = numbers[0]
        for n in numbers[1:]:
            result -= n
        return result
    elif operation == 'mul':
        result = 1
        for n in numbers:
            result *= n
        return result
    elif operation == 'div':
        result = numbers[0]
        for n in numbers[1:]:
            result /= n
        return result</p><p>def main():
    parser = argparse.ArgumentParser(description='澶氬姛鑳借绠楀櫒')
    parser.add_argument('numbers', nargs='+', type=float,
                        help='瑕佽绠楃殑鏁板瓧锛岃嚦灏戜袱涓?)
    parser.add_argument('-o', '--operation', choices=['add', 'sub', 'mul', 'div'],
                        default='add', help='杩愮畻绫诲瀷')
    parser.add_argument('--precision', type=int, default=2,
                        help='缁撴灉淇濈暀灏忔暟浣嶆暟')
    parser.add_argument('-v', '--verbose', action='store_true',
                        help='鏄剧ず璇︾粏璁＄畻杩囩▼')
    
    args = parser.parse_args()
    
    if len(args.numbers) &lt; 2:
        parser.error('鑷冲皯闇€瑕佷袱涓暟瀛?)
    
    result = calculate(args.numbers, args.operation)
    
    if args.verbose:
        op_symbols = {'add': '+', 'sub': '-', 'mul': '*', 'div': '/'}
        expression = f' {op_symbols[args.operation]} '.join(
            [str(n) for n in args.numbers])
        print(f'璁＄畻琛ㄨ揪寮忥細{expression}')
        print(f'杩愮畻绫诲瀷锛歿args.operation}')
    
    print(f'缁撴灉锛歿result:.{args.precision}f}')</p><p>if __name__ == '__main__':
    main()</code></pre></p><p>杩愯绀轰緥锛?<pre><code class="language-bash">$ python calculator.py 10 5 3 -o sub --precision 3 -v

杩愮畻绫诲瀷锛歴ub
缁撴灉锛?.000</code></pre></p><p>鏂版妧鑳界偣锛?<ul><li><code>nargs='+'</code>琛ㄧず鎺ュ彈涓€涓垨澶氫釜鍙傛暟锛?code>type=float</code>鑷姩杞崲绫诲瀷</li>
<li><code>action='store_true'</code>鍒涘缓甯冨皵寮€鍏筹紝鎸囧畾<code>-v</code>鏃跺€间负True</li>
<li><code>--precision</code>灞曠ず濡備綍瀹氫箟鏁存暟鍙傛暟</li>
</ul>
<h2>瀹炴垬鎶€宸э細瀛愬懡浠や笌閰嶇疆鏂囦欢</h2></p><p>褰撲綘鐨勫伐鍏峰姛锟斤拷閫愭笎澧炲鏃讹紝鍙互浣跨敤瀛愬懡浠ゆ潵缁勭粐銆備笅闈㈡槸涓€涓暟鎹鐞嗗伐鍏凤紝鍖呭惈<code>convert</code>鍜?code>analyze</code>涓や釜瀛愬懡浠ゃ€?/p><p><pre><code class="language-python">import argparse
import json</p><p>def handle_convert(args):
    print(f'杞崲鏂囦欢锛歿args.input} -&gt; {args.output}')
    print(f'缂栫爜锛歿args.encoding}')
    if args.pretty:
        print('鍚敤缇庡寲杈撳嚭')</p><p>def handle_analyze(args):
    print(f'鍒嗘瀽鏂囦欢锛歿args.input}')
    print(f'缁熻鎸囨爣锛歿args.metrics}')
    if args.quiet:
        print('闈欓粯妯″紡')</p><p>def main():
    parser = argparse.ArgumentParser(description='鏁版嵁澶勭悊宸ュ叿')
    parser.add_argument('--config', help='閰嶇疆鏂囦欢璺緞')
    
    subparsers = parser.add_subparsers(dest='command', help='鍙敤鍛戒护')
    
    # convert 瀛愬懡浠?    convert_parser = subparsers.add_parser('convert', help='鏂囦欢鏍煎紡杞崲')
    convert_parser.add_argument('input', help='杈撳叆鏂囦欢')
    convert_parser.add_argument('output', help='杈撳嚭鏂囦欢')
    convert_parser.add_argument('--encoding', default='utf-8', help='鏂囦欢缂栫爜')
    convert_parser.add_argument('--pretty', action='store_true', help='缇庡寲杈撳嚭')
    
    # analyze 瀛愬懡浠?    analyze_parser = subparsers.add_parser('analyze', help='鏁版嵁鍒嗘瀽')
    analyze_parser.add_argument('input', help='杈撳叆鏂囦欢')
    analyze_parser.add_argument('--metrics', nargs='+', 
                                choices=['count', 'mean', 'max', 'min'],
                                default=['count'], help='缁熻鎸囨爣')
    analyze_parser.add_argument('--quiet', action='store_true', help='鍑忓皯杈撳嚭')
    
    args = parser.parse_args()
    
    # 鏀寔浠庨厤缃枃浠惰鍙栧弬鏁?    if args.config:
        with open(args.config, 'r') as f:
            config = json.load(f)
            for key, value in config.items():
                if hasattr(args, key) and getattr(args, key) is None:
                    setattr(args, key, value)
    
    if args.command == 'convert':
        handle_convert(args)
    elif args.command == 'analyze':
        handle_analyze(args)
    else:
        parser.print_help()</p><p>if __name__ == '__main__':
    main()</code></pre></p><p>杩愯鏁堟灉锛?<pre><code class="language-bash">$ python data_tool.py convert input.csv output.json --pretty
