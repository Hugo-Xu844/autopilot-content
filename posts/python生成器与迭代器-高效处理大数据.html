        <p><h1>Python鐢熸垚鍣ㄤ笌杩唬鍣細楂樻晥澶勭悊澶ф暟鎹?/h1></p><p>褰撲綘鐨凱ython绋嬪簭闇€瑕佸鐞嗘暟鐧句竾琛屾棩蹇椼€佽秴澶SV鏂囦欢鎴栨棤闄愭暟鎹祦鏃讹紝鐩存帴浣跨敤鍒楄〃瀛樺偍鎵€鏈夋暟鎹線寰€浼氳€楀敖鍐呭瓨锛岀敋鑷冲鑷寸▼搴忓穿婧冦€傜敓鎴愬櫒涓庤凯浠ｅ櫒姝ｆ槸瑙ｅ喅杩欑被闂鐨勫埄鍣ㄢ€斺€斿畠浠€氳繃<strong>鎯版€ц绠?/strong>鏂瑰紡锛屽彧鍦ㄩ渶瑕佹椂鐢熸垚鏁版嵁锛屼粠鑰屽ぇ骞呴檷浣庡唴瀛樺崰鐢ㄣ€?/p><p><h2>涓€銆佽凯浠ｅ櫒锛氭暟鎹祦鐨勭敓浜ц€?/h2></p><p>浠讳綍瀹炵幇浜?code>__iter__()</code>鍜?code>__next__()</code>鏂规硶鐨勫璞￠兘鏄凯浠ｅ櫒銆傚畠鍍忎竴涓€滄暟鎹閬撯€濓紝姣忔璋冪敤<code>next()</code>鎵嶅悙鍑轰笅涓€涓厓绱犮€?/p><p><h3>鍩虹绀轰緥锛氭墜鍔ㄥ疄鐜拌凯浠ｅ櫒</h3>
<pre><code class="language-python">class Counter:
    def __init__(self, start, end):
        self.current = start
        self.end = end
    
    def __iter__(self):
        return self
    
    def __next__(self):
        if self.current &gt;= self.end:
            raise StopIteration
        value = self.current
        self.current += 1
        return value</p><p><h1>浣跨敤杩唬鍣?/h1>
counter = Counter(1, 5)
for num in counter:
    print(num)  # 杈撳嚭: 1 2 3 4</code></pre></p><p><strong>鍏抽敭鐐?/strong>锛?code>for</code>寰幆鏈川涓婃槸涓嶆柇璋冪敤<code>next()</code>鐩村埌鎹曡幏<code>StopIteration</code>寮傚父銆?/p><p><h2>浜屻€佺敓鎴愶拷锟斤拷锛氳凯浠ｅ櫒鐨勪紭闆呭疄鐜?/h2></p><p>鐢熸垚鍣ㄦ槸Python鎻愪緵鐨勪竴绉嶆洿绠€娲佺殑杩唬鍣ㄥ垱寤烘柟寮忋€傜敤<code>yield</code>鍏抽敭瀛楁浛浠?code>return</code>锛屽嚱鏁板氨鍙樻垚浜嗙敓鎴愬櫒鍑芥暟銆?/p><p><h3>瀵规瘮锛氬垪琛?vs 鐢熸垚鍣?/h3>
<pre><code class="language-python"># 鍒楄〃鏂瑰紡锛堜竴娆℃€х敓鎴愭墍鏈夋暟鎹級
def get_squares_list(n):
    return [x**2 for x in range(n)]</p><p><h1>鐢熸垚鍣ㄦ柟寮忥紙鎸夐渶鐢熸垚锛?/h1>
def get_squares_gen(n):
    for x in range(n):
        yield x**2</p><p><h1>娴嬭瘯鍐呭瓨鍗犵敤</h1>

print(f"鐢熸垚鍣ㄥぇ灏? {sys.getsizeof(squares_gen)} bytes")  # 绾?12</code></pre></p><p><strong>瀹為檯鏁堟灉</strong>锛氱敓鎴愬櫒瀵硅薄鏃犺鐢熸垚澶氬皯鏁版嵁锛岃嚜韬ぇ灏忔亽瀹氾紝鑰屽垪琛ㄤ細闅忕潃鏁版嵁閲忕嚎鎬у闀裤€?/p><p><h3>鐢熸垚鍣ㄨ〃杈惧紡锛氫竴琛屼唬鐮佹悶瀹?/h3>
<pre><code class="language-python"># 鍒楄〃鎺ㄥ寮?list_comp = [x*2 for x in range(1000)]</p><p><h1>鐢熸垚鍣ㄨ〃杈惧紡锛堝彧闇€灏嗘柟鎷彿鏀逛负鍦嗘嫭鍙凤級</h1>
gen_expr = (x*2 for x in range(1000))</p><p>print(type(gen_expr))  # &lt;class 'generator'&gt;</code></pre></p><p><h2>涓夈€佸疄鎴橈細澶勭悊澶ф枃浠?/h2></p><p>鍋囪鏈変竴涓?0GB鐨勬棩蹇楁枃浠?code>access.log</code>锛屾垜浠渶瑕佺粺璁℃瘡涓狪P鐨勮闂鏁般€?/p><p><h3>閿欒鍋氭硶锛堝唴瀛樼垎鐐革級</h3>
<pre><code class="language-python">def parse_log_bad(filepath):
    with open(filepath) as f:
        lines = f.readlines()  # 涓€娆℃€у姞杞藉叏閮ㄥ唴瀹瑰埌鍐呭瓨

<pre><code class="language-python">def parse_log_good(filepath):
    ip_counts = {}
    with open(filepath) as f:
        for line in f:  # 鏂囦欢瀵硅薄鏈韩灏辨槸杩唬鍣紝閫愯璇诲彇
            ip = line.split()[0]
            ip_counts[ip] = ip_counts.get(ip, 0) + 1
    return ip_counts</p><p><h1>鎴栬€呬娇鐢ㄧ敓鎴愬櫒鍑芥暟灏佽璇诲彇閫昏緫</h1>

            yield line.strip()</p><p><h1>浣跨敤鐢熸垚鍣ㄥ鐞?/h1>

    process(line)  # 閫愯澶勭悊锛屽唴瀛樺崰鐢ㄦ瀬浣?/code></pre></p><p><strong>鍘熺悊</strong>锛?code>open()</code>杩斿洖鐨勬枃浠跺璞℃槸涓€涓凯浠ｅ櫒锛?code>for line in f</code>涓嶄細灏嗘暣涓枃浠惰鍏ュ唴瀛橈紝鑰屾槸姣忔璇诲彇涓€琛屻€?/p><p><h2>鍥涖€佺敓鎴愬櫒鐨勮繘闃剁敤娉?/h2></p><p><h3>1. 鏃犻檺搴忓垪鐢熸垚</h3>
<pre><code class="language-python">def fibonacci():

<pre><code class="language-python"># 鏋勫缓澶勭悊绠￠亾

        yield item.upper()</p><p><h1>涓茶仈绠￠亾</h1>

for processed_line in pipeline:
    print(processed_line)</code></pre></p><p><h3>3. 浣跨敤<code>yield from</code>绠€鍖栧祵濂楃敓鎴愬櫒</h3>

print(list(combined))  # [1, 2, 3, 'a', 'b', 'c', 4, 5]</code></pre></p><p><h2>浜斻€佹€ц兘瀵规瘮涓庨€夋嫨寤鸿</h2></p><p>| 鍦烘櫙 | 鎺ㄨ崘鏂瑰紡 | 鍘熷洜 |
|------|---------|------|
| 鏁版嵁閲?< 1000鏉?| 鍒楄〃 | 绠€鍗曠洿瑙傦紝璁块棶閫熷害蹇?|

| 闇€瑕佸娆￠亶鍘?| 鍒楄〃/閲嶆柊鍒涘缓鐢熸垚鍣?| 鐢熸垚鍣ㄥ彧鑳介亶鍘嗕竴娆?|
| 鏃犻檺鏁版嵁娴?| 鐢熸垚鍣?| 鏃犳硶鐢ㄥ垪琛ㄨ〃绀烘棤闄愬簭鍒?|</p><p><strong>娴嬭瘯浠ｇ爜</strong>锛氭瘮杈冨垪琛ㄥ拰鐢熸垚鍣ㄧ殑鎬ц兘

<h1>涓よ€呰€楁椂鐩歌繎锛屼絾鐢熸垚鍣ㄥ唴瀛樺崰鐢ㄥ嚑涔庝负0</code></pre></h1></p><p><h2>鎬荤粨</h2></p><p><ul><li><strong>杩唬鍣?/strong>鏄疄鐜颁簡<code>__iter__</code>鍜?code>__next__</code>鐨勫璞★紝鏀寔鎯版€ц绠?/li>
